<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background for maskable (no rounded corners) -->
  <rect width="512" height="512" fill="#0f1117"/>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Safe zone: content within inner 80% (102–410) -->
  <rect x="112" y="310" width="50" height="120" rx="6" fill="#6366f1" opacity="0.6"/>
  <rect x="182" y="255" width="50" height="175" rx="6" fill="#6366f1" opacity="0.75"/>
  <rect x="252" y="200" width="50" height="230" rx="6" fill="#6366f1" opacity="0.9"/>
  <rect x="322" y="235" width="50" height="195" rx="6" fill="#22c55e" opacity="0.9"/>
  <rect x="392" y="155" width="50" height="275" rx="6" fill="url(#accent)"/>
  <polyline points="137,300 207,245 277,188 347,222 417,142"
    fill="none" stroke="#818cf8" stroke-width="10"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <circle cx="137" cy="300" r="8" fill="#818cf8"/>
  <circle cx="207" cy="245" r="8" fill="#818cf8"/>
  <circle cx="277" cy="188" r="8" fill="#818cf8"/>
  <circle cx="347" cy="222" r="8" fill="#818cf8"/>
  <circle cx="417" cy="142" r="11" fill="#22c55e"/>
</svg>
