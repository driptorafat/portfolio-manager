<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f1117"/>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d27"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Chart bars -->
  <rect x="88"  y="300" width="60" height="140" rx="8" fill="#6366f1" opacity="0.6"/>
  <rect x="168" y="240" width="60" height="200" rx="8" fill="#6366f1" opacity="0.75"/>
  <rect x="248" y="180" width="60" height="260" rx="8" fill="#6366f1" opacity="0.9"/>
  <rect x="328" y="220" width="60" height="220" rx="8" fill="#22c55e" opacity="0.9"/>
  <rect x="408" y="140" width="60" height="300" rx="8" fill="url(#accent)"/>
  <!-- Trend line -->
  <polyline points="118,290 198,230 278,165 358,205 438,125"
    fill="none" stroke="#818cf8" stroke-width="10"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Dots on line -->
  <circle cx="118" cy="290" r="9" fill="#818cf8"/>
  <circle cx="198" cy="230" r="9" fill="#818cf8"/>
  <circle cx="278" cy="165" r="9" fill="#818cf8"/>
  <circle cx="358" cy="205" r="9" fill="#818cf8"/>
  <circle cx="438" cy="125" r="12" fill="#22c55e"/>
</svg>
